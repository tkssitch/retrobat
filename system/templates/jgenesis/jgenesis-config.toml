config_version = "0.11.0"
rom_search_dirs = []
recent_open_list = []
egui_theme = "SystemDefault"
gui_window_width = 900.0
gui_window_height = 675.0

[common]
audio_output_frequency = 48000
mute_audio = false
audio_sync = true
audio_dynamic_resampling_ratio = true
audio_buffer_size = 2048
audio_hardware_queue_size = 256
audio_gain_db = 0.0
save_path = "EmulatorFolder"
custom_save_path = ''
state_path = "EmulatorFolder"
custom_state_path = ''
launch_in_fullscreen = false
initial_window_size = 3
wgpu_backend = "Auto"
vsync_mode = "Disabled"
frame_time_sync = true
auto_prescale = true
prescale_factor = 3
scanlines = "None"
force_integer_height_scaling = false
filter_mode = "Linear"
preprocess_shader = "None"
load_recent_state_at_launch = false
fast_forward_multiplier = 2
rewind_buffer_length_seconds = 10
pause_emulator = "Never"
hide_mouse_cursor = "Fullscreen"

[smsgg]
remove_sprite_limit = false
sms_aspect_ratio = "Ntsc"
gg_aspect_ratio = "GgLcd"
sms_timing_mode = "Ntsc"
sms_model = "Sms1"
sms_crop_vertical_border = true
sms_crop_left_border = false
gg_frame_blending = false
gg_use_sms_resolution = false
fm_sound_unit_enabled = true
z80_divider = 15
sms_boot_from_bios = false
gg_boot_from_bios = false

[genesis]
aspect_ratio = "Auto"
force_square_pixels_in_h40 = false
adjust_aspect_ratio_in_2x_resolution = true
remove_sprite_limits = false
m68k_clock_divider = 7
non_linear_color_scale = true
deinterlace = true
render_vertical_border = false
render_horizontal_border = false
plane_a_enabled = true
plane_b_enabled = true
window_enabled = true
backdrop_enabled = true
sprites_enabled = true
quantize_ym2612_output = true
opn2_busy_behavior = "Ym3438"
emulate_ym2612_ladder_effect = true
genesis_lpf_enabled = true
genesis_lpf_cutoff = 3390
ym2612_2nd_lpf_enabled = false
ym2612_2nd_lpf_cutoff = 7973
ym2612_channels_enabled = [
    true,
    true,
    true,
    true,
    true,
    true,
]
ym2612_enabled = true
psg_enabled = true
ym2612_volume_adjustment_db = 0.0
psg_volume_adjustment_db = 0.0

[sega_cd]
per_region_bios = true
pcm_interpolation = "None"
enable_ram_cartridge = true
load_disc_into_ram = false
disc_drive_speed = 1
sub_cpu_divider = 4
pcm_lpf_enabled = true
pcm_lpf_cutoff = 7973
apply_genesis_lpf_to_pcm = false
apply_genesis_lpf_to_cd_da = false
pcm_enabled = true
cd_audio_enabled = true
pcm_volume_adjustment_db = 0.0
cd_volume_adjustment_db = 0.0

[sega_32x]
sh2_clock_multiplier = 3
video_out = "Combined"
apply_genesis_lpf_to_pwm = true
darken_genesis_colors = true
color_tint = "None"
show_high_priority = true
show_low_priority = true
void_color_type = "Direct"
emulate_pixel_switch_delay = false
void_palette_index = 0
void_direct = [
    0,
    0,
    0,
]
void_direct_priority = false
pwm_resampling = "WindowedSinc"
pwm_enabled = true
pwm_volume_adjustment_db = 0.0

[nes]
aspect_ratio = "Ntsc"
ntsc_crop_vertical_overscan = true
remove_sprite_limit = false
pal_black_border = false
silence_ultrasonic_triangle_output = false
audio_resampler = "WindowedSinc"
audio_60hz_hack = false
allow_opposing_joypad_inputs = false
dma_dummy_joy_reads = true
palette = ""

[nes.overscan]
top = 0
bottom = 0
left = 0
right = 0

[snes]
aspect_ratio = "Ntsc"
deinterlace = true
audio_interpolation = "Gaussian"
audio_60hz_hack = false
gsu_overclock_factor = 1

[game_boy]
force_dmg_mode = false
force_cgb_mode = false
pretend_to_be_gba = false
dmg_boot_rom = false
cgb_boot_rom = false
aspect_ratio = "SquarePixels"
gb_palette = "GreenTint"
gb_custom_palette = [
    [
    255,
    255,
    255,
],
    [
    170,
    170,
    170,
],
    [
    85,
    85,
    85,
],
    [
    0,
    0,
    0,
],
]
gbc_color_correction = "GbcLcd"
gbc_correction_gamma = 2.0
gba_correction_gamma = 3.2
frame_blending = true
audio_resampler = "WindowedSinc"
audio_60hz_hack = false

[game_boy_advance]
skip_bios_animation = false
aspect_ratio = "SquarePixels"
color_correction = "GbaLcd"
color_correction_gamma = 3.2
frame_blending = true
audio_interpolation = "NearestNeighbor"
psg_low_pass = false
pulse_1_enabled = true
pulse_2_enabled = true
wavetable_enabled = true
noise_enabled = true
pcm_a_enabled = true
pcm_b_enabled = true
solar_brightness_step = 5
solar_min_brightness = 23
solar_max_brightness = 175

