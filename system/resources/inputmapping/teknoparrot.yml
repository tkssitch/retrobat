# This file is provided with RetroBat
# It can be used to automatically generate specific input mappings in TeknoParrot for Arcade games
# Each container must be named exactly the same as the .xml Game Profile file and put in lowercase(without the extension)
#
# The elements listed are the <InputMapping> values for each game in Teknoparrot
# The key represents the InputMapping value in TeknoParrot XML
# The value represents the Button on the gamepad
#
# List of possible values:
# r3, l3, select, start, righttrigger, lefttrigger, rightshoulder, leftshoulder, south, east, west, north, up, down, left, right, leftstickleft, leftstickright, leftstickup, leftstickdown, rightstickleft, rightstickright, rightstickup, rightstickdown
#
# For lightguns, usually they have 3 buttons recognized as mousebuttons, to declare mouse buttons, you need to use the button hereunder as key and the InputMapping as value
# Look at the example for hotd4
# List of possible values: 
# mouseleft, mousemiddle, mouseright, button4, button5
#
# Other lightgun buttons are usually identified as keyboard buttons, in that case use:
# kb_x where x equals to a keyboard key
# kb_dy where y equals to a keyboard number key
#
############### ACTION ###############

actiondeka:
  Test: l3 # Test
  Service1: r3 # Service
  Coin1: kb_5 # Coin
  P1ButtonStart: start # P1 Start
  P1Button1: righttrigger # P1 Right Trigger
  P1Button2: lefttrigger # P1 Reload/Guard
  P1Button3: west # P1 Left Jab
  P1Button4: leftshoulder # P1 Left Hook
  P2ButtonStart: start # P2 Start
  P2Button1: righttrigger # P2 Right Trigger
  P2Button2: lefttrigger # P2 Reload/Guard
  P2Button3: west # P2 Left Jab
  P2Button4: leftshoulder # P2 Left Hook
  JvsTwoP1ButtonStart: select # P1 Change Control Mode
  JvsTwoP1Button1: south # P1 Left Uppercut
  JvsTwoP1Button2: north # P1 Right Jab
  JvsTwoP1Button3: rightshoulder # P1 Right Hook
  JvsTwoP1Button4: east # P1 Right Uppercut
  JvsTwoP2ButtonStart: select # P2 Change Control Mode
  JvsTwoP2Button1: south # P2 Left Uppercut
  JvsTwoP2Button2: north # P2 Right Jab
  JvsTwoP2Button3: rightshoulder # P2 Right Hook
  JvsTwoP2Button4: east # P2 Right Uppercut
  Analog0: rightstickleft # P1 Right Gun X
  Analog2: rightstickup # P1 Right Gun Y        
  Analog4: rightstickleft # P2 Right Gun X P1 Drive Steering Axis
  Analog6: leftstickleft # P1 Drive Steering Axis 
  Analog8: leftstickleft # P2 Drive Steering Axis

  # Unmapped inputs:
  P1LightGun:   # P1 Right Light Gun
  P1RelativeDown:   # P1 Right Gun Y Down
  P1RelativeLeft:   # P1 Drive Steering Left
  P1RelativeRight:   # P1 Drive Steering Right
  P1RelativeUp:   # P1 Right Gun Y Up
  P2LightGun:   # P2 Right Light Gun
  P2RelativeDown:   # P2 Right Gun Y Down
  P2RelativeLeft:   # P2 Drive Steering Left
  P2RelativeRight:   # P2 Drive Steering Right
  P2RelativeUp:   # P2 Right Gun Y Up
  P3LightGun:   # P1 Drive Steering Axis
  P4LightGun:   # P2 Drive Steering Axis

